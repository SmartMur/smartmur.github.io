<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.8" />
    </linearGradient>
    <pattern id="gridPattern" x="40" y="40" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bannerGradient)"/>

  <!-- Grid pattern overlay -->
  <rect width="1200" height="400" fill="url(#gridPattern)"/>

  <!-- Subtle accent line -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#30363d" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#30363d" stroke-width="1" opacity="0.1"/>

  <!-- Left side: Logo area -->
  <g>
    <!-- Hexagon outer border -->
    <polygon points="160,100 233.2,140 233.2,220 160,260 86.8,220 86.8,140"
             fill="none" stroke="url(#hexGradient)" stroke-width="3" stroke-linejoin="round"/>

    <!-- Hexagon inner -->
    <polygon points="160,115 220,150 220,210 160,245 100,210 100,150"
             fill="none" stroke="url(#hexGradient)" stroke-width="2" stroke-linejoin="round" opacity="0.5"/>

    <!-- Center circle and N -->
    <circle cx="160" cy="180" r="12" fill="#3fb950" opacity="0.7"/>
    <text x="160" y="195"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="70"
          font-weight="700"
          fill="#58a6ff"
          text-anchor="middle"
          dominant-baseline="middle"
          filter="url(#textGlow)">N</text>
  </g>

  <!-- Right side: Text content -->
  <g>
    <!-- Main title: SMARTMUR -->
    <text x="320" y="140"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="72"
          font-weight="800"
          fill="#c9d1d9"
          letter-spacing="2"
          filter="url(#textGlow)">SMARTMUR</text>

    <!-- Subtitle -->
    <text x="320" y="195"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28"
          font-weight="600"
          fill="#58a6ff">Sovereign AI Operations Platform</text>

    <!-- Tagline -->
    <text x="320" y="250"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="18"
          font-weight="500"
          fill="#3fb950">Your infrastructure, your AI, your rules.</text>

    <!-- Accent line -->
    <line x1="320" y1="270" x2="1100" y2="270" stroke="#3fb950" stroke-width="2" opacity="0.6"/>

    <!-- Feature text (faint) -->
    <text x="320" y="310"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="13"
          font-weight="400"
          fill="#8b949e">Orchestrate • Automate • Control</text>
  </g>

  <!-- Subtle corner accents -->
  <g stroke="#3fb950" stroke-width="2" opacity="0.3" stroke-linecap="round">
    <line x1="80" y1="50" x2="130" y2="50"/>
    <line x1="80" y1="50" x2="80" y2="100"/>

    <line x1="1120" y1="50" x2="1070" y2="50"/>
    <line x1="1120" y1="50" x2="1120" y2="100"/>

    <line x1="80" y1="350" x2="130" y2="350"/>
    <line x1="80" y1="300" x2="80" y2="350"/>

    <line x1="1120" y1="350" x2="1070" y2="350"/>
    <line x1="1120" y1="300" x2="1120" y2="350"/>
  </g>
</svg>
