<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0d1117; --primary: #58a6ff; --accent: #3fb950; }
      }
    </style>
    <radialGradient id="hexGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="#0d1117"/>

  <!-- Glow effect -->
  <circle cx="64" cy="64" r="55" fill="url(#hexGlow)" filter="url(#glow)"/>

  <!-- Hexagon outer border -->
  <polygon points="64,16 110.35,40 110.35,88 64,112 17.65,88 17.65,40"
           fill="none" stroke="url(#hexGradient)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Hexagon inner filled -->
  <polygon points="64,24 104.35,46 104.35,82 64,104 23.65,82 23.65,46"
           fill="none" stroke="url(#hexGradient)" stroke-width="1.5" stroke-linejoin="round" opacity="0.6"/>

  <!-- Center accent circle -->
  <circle cx="64" cy="64" r="8" fill="#3fb950" opacity="0.8"/>
  <circle cx="64" cy="64" r="6" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.6"/>

  <!-- Large "N" text -->
  <text x="64" y="77"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="48"
        font-weight="700"
        fill="#58a6ff"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="url(#glow)">N</text>

  <!-- Subtle corner accents -->
  <line x1="24" y1="30" x2="32" y2="30" stroke="#3fb950" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="24" y1="30" x2="24" y2="38" stroke="#3fb950" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

  <line x1="104" y1="30" x2="96" y2="30" stroke="#3fb950" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="104" y1="30" x2="104" y2="38" stroke="#3fb950" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>
